global:
  ci: false
# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: ghcr.io
  repository: svtechnmaa/arangodb # CHANGE THIS TO YOUR IMAGE
  tag: 3.12.2
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  loadBalancerIP: "" # set to the IP you want to use for the LoadBalancer

# Single or Cluster
mode: Single
single:
  single:
    resources: {}
    volumeClaimTemplate:
      spec:
        storageClassName: local-path
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
        volumeMode: Filesystem
      status: {}
cluster:
  environment: Production
  agents:
    counts: 3
    args: 
      - --log.level=debug
    resources: {}
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      #   storage: 1Gi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      #   storage: 1Gi
    volumeClaimTemplate:
      spec:
        resources:
          requests:
            storage: 8Gi
        volumeMode: Filesystem
        storageClassName: local-path
        accessModes:
        - ReadWriteOnce
  coordinators:
    counts: 3
    resources: {}
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      #   storage: 1Gi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      #   storage: 1Gi
    volumeClaimTemplate:
      spec:
        resources:
          requests:
            storage: 8Gi
        volumeMode: Filesystem
        storageClassName: local-path
        accessModes:
        - ReadWriteOnce
  dbservers:
    counts: 3
    resources: {}
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      #   storage: 1Gi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      #   storage: 1Gi
    volumeClaimTemplate:
      spec:
        resources:
          requests:
            storage: 8Gi
        volumeMode: Filesystem
        storageClassName: local-path
        accessModes:
        - ReadWriteOnce
auth:
  secretName: arango-root-pwd
  rootUser: root
  rootPassword: ""
