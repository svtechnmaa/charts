global:
  externalIP: "" # externalIP for CICD
  mariadb-galera:
    enabled: true
    replicaCount: 3
init:
  image:
    registry: ghcr.io
    repository: svtechnmaa/mysql
    tag: 8.2.0

image:
  registry: ghcr.io
  repository: svtechnmaa/svtech_maxscale
  tag: v1.0.9
  pullPolicy: IfNotPresent

service:
  externalIPs: []

maxscaleConfig:
  # The server variable will not be used by default, it will be used only when external database is enabled
  server: 
    - db01://10.98.3.11:3306
    - db02://10.98.3.12:3306
    - db03://10.98.3.13:3306
  monitor_user: maxscale_monitor
  monitor_user_password: maxscale@123

# List of MaxScale router services to expose. Each entry becomes a router
# inside the container (env MXS_<id>_TYPE / _PORT / _ROUTER_OPTIONS) and a
# port on the mariadb Service. Default = single readwritesplit on 4006.
routers:
  - id: rwsplit
    type: readwritesplit
    port: 4006
    servicePort: 3306

replicaCount: 2
