apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bngblaster-gui.backendName" . }}
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "bngblaster-gui.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "bngblaster-gui.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: {{ include "bngblaster-gui.image" (dict "root" . "component" "backend" "image" .Values.backend.image) | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "bngblaster-gui.fullname" . }}-config
            - secretRef:
                name: {{ include "bngblaster-gui.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bngblaster-gui.backendName" . }}
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
  selector:
    {{- include "bngblaster-gui.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
