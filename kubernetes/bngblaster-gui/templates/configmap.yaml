{{- $ingressPath := trimSuffix "/" (printf "/%s" (trimPrefix "/" .Values.ingress.path)) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bngblaster-gui.fullname" . }}-config
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
data:
  BNGBLASTER_BACKEND_URL: {{ default (printf "%s/api" $ingressPath) .Values.backend.config.bngblasterBackendUrl | quote }}
  FRONTEND_URL: {{ .Values.backend.config.frontendUrl | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bngblaster-gui.fullname" . }}-frontend-nginx
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location = {{ $ingressPath }} {
            return 302 {{ $ingressPath }}/;
        }

        location {{ $ingressPath }}/api/ {
            rewrite ^{{ $ingressPath }}/(.*)$ /$1 break;
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location {{ $ingressPath }}/docs {
            rewrite ^{{ $ingressPath }}/(.*)$ /$1 break;
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
        }

        location {{ $ingressPath }}/openapi.json {
            rewrite ^{{ $ingressPath }}/(.*)$ /$1 break;
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
        }

        location {{ $ingressPath }}/ {
            rewrite ^{{ $ingressPath }}/(.*)$ /$1 break;
            try_files $uri $uri/ /index.html;
        }
    }
