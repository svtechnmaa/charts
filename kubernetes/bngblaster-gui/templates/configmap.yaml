{{- $ingressPath := include "bngblaster-gui.ingressPath" . -}}
{{- $isRootPath := eq $ingressPath "/" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bngblaster-gui.fullname" . }}-config
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
data:
  BNGBLASTER_BACKEND_URL: {{ ternary "/api" (printf "%s/api" $ingressPath) $isRootPath | quote }}
  FRONTEND_URL: {{ $ingressPath | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bngblaster-gui.fullname" . }}-frontend-nginx
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        {{- if not $isRootPath }}
        location = {{ $ingressPath }} {
            return 302 {{ $ingressPath }}/;
        }

        location {{ $ingressPath }}/ {
            rewrite ^{{ $ingressPath }}/(.*)$ /$1 last;
        }
        {{- end }}

        location ~ ^/api(?:/|$) {
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location = /docs {
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
        }

        location = /docs/oauth2-redirect {
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
        }

        location = /openapi.json {
            proxy_pass http://{{ include "bngblaster-gui.backendName" . }}:{{ .Values.backend.service.port }};
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
