{{- $postgresqlHa := index .Values "postgresql-ha" -}}
{{- $externalPostgresql := default dict (index .Values "externalPostgresql") -}}
{{- $externalUsername := index $externalPostgresql "username" -}}
{{- $externalPassword := index $externalPostgresql "password" -}}
{{- $externalDatabase := index $externalPostgresql "database" -}}
{{- $externalPort := default 5432 (index $externalPostgresql "port") -}}
{{- $externalHost := index $externalPostgresql "host" -}}
{{- $dbUsername := "" -}}
{{- $dbPassword := "" -}}
{{- $dbName := "" -}}
{{- $dbPort := $externalPort -}}
{{- if $postgresqlHa.enabled -}}
{{- if $externalHost -}}
{{- fail "externalPostgresql.host cannot be set when postgresql-ha.enabled=true; set postgresql-ha.enabled=false to use an external database" -}}
{{- end -}}
{{- $_ := required "postgresql-ha.postgresql.repmgrPassword is required" $postgresqlHa.postgresql.repmgrPassword -}}
{{- $_ := required "postgresql-ha.pgpool.adminPassword is required" $postgresqlHa.pgpool.adminPassword -}}
{{- $dbUsername = required "postgresql-ha.postgresql.username is required when postgresql-ha.enabled=true" $postgresqlHa.postgresql.username -}}
{{- $dbPassword = required "postgresql-ha.postgresql.password is required when postgresql-ha.enabled=true" $postgresqlHa.postgresql.password -}}
{{- $dbName = required "postgresql-ha.postgresql.database is required when postgresql-ha.enabled=true" $postgresqlHa.postgresql.database -}}
{{- $dbPort = 5432 -}}
{{- else -}}
{{- $dbUsername = required "externalPostgresql.username is required when postgresql-ha.enabled=false" $externalUsername -}}
{{- $dbPassword = required "externalPostgresql.password is required when postgresql-ha.enabled=false" $externalPassword -}}
{{- $dbName = required "externalPostgresql.database is required when postgresql-ha.enabled=false" $externalDatabase -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bngblaster-gui.fullname" . }}-secret
  namespace: {{ include "bngblaster-gui.namespace" . | quote }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "backend.secret.secretKey is required" .Values.backend.secret.secretKey | quote }}
  FERNET_KEY: {{ .Values.backend.secret.fernetKey | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.backend.secret.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.backend.secret.googleClientSecret | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.backend.secret.keycloakClientSecret | quote }}
  POSTGRES_USER: {{ $dbUsername | quote }}
  POSTGRES_PASSWORD: {{ $dbPassword | quote }}
  POSTGRES_DB: {{ $dbName | quote }}
  DATABASE_URL: {{ printf "postgresql+psycopg2://%s:%s@%s:%d/%s" ($dbUsername | urlquery) ($dbPassword | urlquery) (include "bngblaster-gui.databaseHost" .) (int $dbPort) ($dbName | urlquery) | quote }}
