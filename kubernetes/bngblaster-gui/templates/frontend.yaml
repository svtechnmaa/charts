{{- $ingressPath := include "bngblaster-gui.ingressPath" . -}}
{{- $probePath := ternary "/" (printf "%s/" $ingressPath) (eq $ingressPath "/") -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bngblaster-gui.frontendName" . }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "bngblaster-gui.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "bngblaster-gui.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: {{ include "bngblaster-gui.image" (dict "root" . "component" "frontend" "image" .Values.frontend.image) | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: {{ $probePath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $probePath }}
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "bngblaster-gui.fullname" . }}-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bngblaster-gui.frontendName" . }}
  labels:
    {{- include "bngblaster-gui.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
  selector:
    {{- include "bngblaster-gui.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
