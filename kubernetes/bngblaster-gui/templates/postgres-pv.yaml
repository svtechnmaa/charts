{{- $postgresqlHa := index .Values "postgresql-ha" -}}
{{- $pvcStorageClass := default "" $postgresqlHa.persistence.storageClass -}}
{{- if and $postgresqlHa.enabled .Values.postgresStorage.enabled (ne $pvcStorageClass "-") -}}
{{- fail "postgresStorage.enabled must be false when postgresql-ha.persistence.storageClass is not \"-\"" -}}
{{- end -}}
{{- if and $postgresqlHa.enabled .Values.postgresStorage.enabled }}
{{- range $index, $volume := .Values.postgresStorage.volumes }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $volume.name | quote }}
  labels:
    {{- include "bngblaster-gui.labels" $ | nindent 4 }}
    app.kubernetes.io/component: postgres-storage
spec:
  capacity:
    storage: {{ $volume.capacity | default (index $.Values "postgresql-ha").persistence.size | quote }}
  volumeMode: {{ $.Values.postgresStorage.volumeMode }}
  accessModes:
    {{- toYaml ($.Values.postgresStorage.accessModes | default (list "ReadWriteOnce")) | nindent 4 }}
  persistentVolumeReclaimPolicy: {{ $.Values.postgresStorage.reclaimPolicy }}
  storageClassName: ""
  claimRef:
    namespace: {{ include "bngblaster-gui.namespace" $ | quote }}
    name: {{ $volume.claimName | default (printf "data-%s-postgresql-ha-postgresql-%d" $.Release.Name $index) | quote }}
  hostPath:
    path: {{ required "postgresStorage.volumes[].hostPath is required" $volume.hostPath | quote }}
    type: DirectoryOrCreate
  {{- with $volume.nodeAffinity }}
  nodeAffinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
