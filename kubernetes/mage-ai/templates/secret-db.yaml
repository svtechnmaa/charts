{{- if or .Values.postgresql.enabled .Values.postgresqlExternal.enabled }}
{{- $conn := "" }}
{{- if .Values.postgresql.enabled }}
{{- $conn = printf "postgresql://%s:%s@%s:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Values.postgresql.fullnameOverride .Values.postgresql.auth.database }}
{{- else if .Values.postgresqlExternal.enabled }}
{{- $conn = printf "postgresql://%s:%s@%s-%s:5432/%s" .Values.postgresqlExternal.auth.username .Values.postgresqlExternal.auth.password .Release.Name .Values.postgresqlExternal.postgresqlExternalHost .Values.postgresqlExternal.auth.database }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}-db
type: Opaque
data:
  MAGE_DATABASE_CONNECTION_URL: {{ $conn | b64enc | quote }}
{{- end }}