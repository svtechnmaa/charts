apiVersion: v1
kind: Secret
metadata:
  name: netforge-be-secret-env
data:
  {{- range $key, $val := .Values.netforgeAppSecretEnv }}
  {{ $key }}: {{ $val | b64enc | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: netforge-secret
type: Opaque
data:
  user: {{ .Values.global.github.user | b64enc | quote }}
  token: {{ .Values.global.github.token | b64enc | quote }}
  fg_token: {{ .Values.global.github.fg_token | b64enc | quote }}