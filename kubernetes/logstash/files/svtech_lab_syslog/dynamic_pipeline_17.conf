                patterns_files_glob => "test"
            }
        }
        else if [junos_eventname] in ['CHASSISD_RE_CONSOLE_FE_STORM', 'CHASSISD_RE_CONSOLE_ME_STORM', 'CHASSISD_RE_CPU_FIRE_TEMP_SHUTDOWN', 'CHASSISD_RE_CPU_OVER_TEMP_WARNING', 'CHASSISD_RE_CPU_WARM_TEMP_WARNING', 'CHASSISD_RE_INIT_INVALID_RE_SLOT']{
            grok {
                match => { "junos_msg" => 'routing-engine-slot=\"%{DATA:routing_engine_slot}\"' }
                patterns_dir => ["/etc/logstash/patterns"]
                patterns_files_glob => "test"
            }
        }
        else if 'CHASSISD_RE_OVER_TEMP_SHUTDOWN' in [junos_eventname]{
            grok {
                match => { "junos_msg" => 'routing-engine-slot=\"%{DATA:routing_engine_slot}\"%{DATA}threshold=\"%{DATA:threshold}\"%{DATA}action=\"%{DATA:action}\"' }
                patterns_dir => ["/etc/logstash/patterns"]
                patterns_files_glob => "test"
            }
        }
        else if [junos_eventname] in ['CHASSISD_RE_CPU_OVER_TEMP_CONDITION', 'CHASSISD_RE_CPU_WARM_TEMP_CONDITION', 'CHASSISD_RE_WARM_TEMP_CONDITION']{
            grok {
                match => { "junos_msg" => 'routing-engine-slot=\"%{DATA:routing_engine_slot}\"(?:\s*(?:[^"]*?\s*temperature=\"%{DATA:temperature}\")?)(?:\s*(?:[^"]*?\s*threshold=\"%{DATA:threshold}\")?)' }
                patterns_dir => ["/etc/logstash/patterns"]
                patterns_files_glob => "test"
            }
        }
        else if 'CHASSISD_RE_OVER_TEMP_CONDITION' in [junos_eventname]{
            grok {
                match => { "junos_msg" => 'routing-engine-slot=\"%{DATA:routing_engine_slot}\"(?:\s*(?:[^"]*?\s*temperature=\"%{DATA:temperature}\")?).*threshold=\"%{DATA:threshold}\"' }
                patterns_dir => ["/etc/logstash/patterns"]
                patterns_files_glob => "test"
            }
        }
        else if 'CHASSISD_RE_OVER_TEMP_WARNING' in [junos_eventname]{
            grok {
                match => { "junos_msg" => 'routing-engine-slot=\"%{DATA:routing_engine_slot}\"(?:\s*(?:[^"]*?\s*temperature=\"%{DATA:temperature}\")?).*threshold=\"%{DATA:threshold}\".*component=\"%{DATA:component}\".*duration=\"%{DATA:duration}\"' }
                patterns_dir => ["/etc/logstash/patterns"]
                patterns_files_glob => "test"
            }
        }
    }
    output {
        elasticsearch {
            #hosts => ["https://localhost:9201"]
            hosts => ["https://localhost:9200"]
            index => "junos-hien-lab-log"
            # cacert => "/etc/logstash/certs/NMS01.pem"
            user => "elastic"
