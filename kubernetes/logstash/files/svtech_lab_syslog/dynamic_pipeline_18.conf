                match => { "junos_msg" => 'shard-configured-count=\"%{DATA:shard_configured_count}\"%{DATA}shard-running-count=\"%{DATA:shard_running_count}\"%{DATA}updio-configured-count=\"%{DATA:updio_configured_count}\"%{DATA}updio-running-count=\"%{DATA:updio_running_count}\"%{DATA}updio-configured-gss=\"%{DATA:updio_configured_gss}\"%{DATA}updio-running-gss=\"%{DATA:updio_running_gss}\"' }
                patterns_dir => ["/etc/logstash/patterns"]
                patterns_files_glob => "test"
            }
        }
    }
    output {
        elasticsearch {
            #hosts => ["https://localhost:9201"]
            hosts => ["https://localhost:9200"]
            index => "junos-hien-lab-log"
            # cacert => "/etc/logstash/certs/NMS01.pem"
            user => "elastic"
            password => "juniper@123"
            ssl_certificate_verification => false
        }
        stdout {codec => rubydebug}
        if "_grokparsefailure" in [tags] {
            file { path => "/var/log/logstash/login_failed_onlinelog_events-%{+YYYY-MM}_subpipeline" }
        }
    }