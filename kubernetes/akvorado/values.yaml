global:
  frontendVip: ""
  backendVip: ""
  akvorado:
    enabled: true
  basePath: /opt/shared/
  kafkaConfig:
    topic: flows
    partition: 1

init:
    image:
      registry: docker.io
      repository: busybox
      tag: 1.33
      pullPolicy: IfNotPresent
      
console:
  image:
    repository: ghcr.io/akvorado/akvorado
    tag: 1.11.2
    pullPolicy: IfNotPresent
  replicaCount: 1
  revisionHistoryLimit: 0
  updateStrategy: Recreate
  sharedPersistenceVolume:
    volumeName: console-volume
    pvcName: console-pvc
    storageSize: 2Gi
    path: /run/akvorado
    accessModes: ReadWriteOnce
    storageClass: console-hostpath
  service:
    type: LoadBalancer

redis:
  replicaCount: 1
  service:
    type: ClusterIP
  
inlet:
  image:
    repository: ghcr.io/akvorado/akvorado
    tag: 1.11.2
    pullPolicy: IfNotPresent
  replicaCount: 2
  revisionHistoryLimit: 0
  updateStrategy: Recreate
  sharedPersistenceVolume:
    volumeName: inlet-volume
    pvcName: inlet-pvc
    storageSize: 2Gi
    path: /run/akvorado
    accessModes: ReadWriteOnce
    storageClass: inlet-hostpath
  service:
    type: LoadBalancer
  config:
    providers:
    - ip: "::/0"
      community: "public"

orchestrator:
  image:
    repository: ghcr.io/akvorado/akvorado
    tag: 1.11.2
    pullPolicy: IfNotPresent
  replicaCount: 1
  revisionHistoryLimit: 0
  updateStrategy: Recreate
  service:
    type: ClusterIP
  clickhouse_cluster: "akvorado"

geoip:
  image:
    repository: ghcr.io/akvorado/ipinfo-geoipupdate
    tag: latest
    pullPolicy: IfNotPresent
  env:
    ipinfo_token: "a2632ea59736c7"
    ipinfo_db: "country asn"
    update_time: "48h"
  sharedPersistenceVolume:
    volumeName: geoip-volume
    pvcName: geoip-pvc
    storageSize: 2Gi
    path: /usr/share/GeoIP
    accessModes: ReadWriteOnce
    storageClass: geoip-hostpath


clickhouse:
  servers:
  - 10.98.5.221:9000
  - 10.98.5.222:9000
  - 10.98.5.223:9000
  username: ""
  password: ""
