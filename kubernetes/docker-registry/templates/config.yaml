apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-configuration" (include "common.names.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: docker-registry
data:
  config.yml: |
    version: 0.1
    log:
      level: {{ .Values.registry.log.level | default "info" }}
    storage:
      {{- if eq (.Values.registry.storageBackend | default "s3") "s3" }}
      {{- $endpoint := .Values.registry.s3.endpointOverride | default (include "registry.s3.endpoint" .) }}
      s3:
        bucket: {{ .Values.registry.s3.bucket | required "registry.s3.bucket is required" }}
        region: {{ .Values.registry.s3.region | default "us-east-1" }}
        regionendpoint: {{ $endpoint }}
        secure: {{ .Values.registry.s3.secure | default false }}
        v4auth: {{ .Values.registry.s3.v4auth }}
        rootdirectory: {{ .Values.registry.s3.rootdirectory | default "/" }}
        forcepathstyle: {{ .Values.registry.s3.forcepathstyle }}
        chunksize: {{ .Values.registry.s3.chunksize | default 5242880 | int64 }}
        multipartcopythresholdsize: {{ .Values.registry.s3.multipartcopythresholdsize | default 5368709120 | int64 }}
        multipartcopychunksize: {{ .Values.registry.s3.multipartcopychunksize | default 33554432 | int64 }}
        multipartcopymaxconcurrency: {{ .Values.registry.s3.multipartcopymaxconcurrency | default 1 | int }}
      {{- else if eq (.Values.registry.storageBackend | default "s3") "filesystem" }}
      filesystem:
        rootdirectory: {{ .Values.registry.filesystem.rootdirectory | default "/var/lib/registry" }}
      delete:
        enabled: {{ .Values.registry.filesystem.delete.enabled }}
      {{- else }}
      {{- fail "registry.storageBackend must be either s3 or filesystem" }}
      {{- end }}
      redirect:
        disable: {{ .Values.registry.storage.redirect.disable }}
    http:
      addr: {{ .Values.registry.http.addr | default ":5000" }}
      headers:
        X-Content-Type-Options: {{ .Values.registry.http.headers.XContentTypeOptions | default (index .Values.registry.http.headers "X-Content-Type-Options") | default "[nosniff]" }}
