apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: docker-registry
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  httpSecret: {{ .Values.registry.http.secret | required "registry.http.secret is required" | quote }}
{{- if eq (.Values.registry.storageBackend | default "s3") "s3" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}-s3
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: docker-registry
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  accesskey: {{ .Values.registry.s3.accesskey | required "registry.s3.accesskey is required" | quote }}
  secretkey: {{ .Values.registry.s3.secretkey | required "registry.s3.secretkey is required" | quote }}
{{- end }}
