global:
  imageRegistry: ""

image:
  registry: ghcr.io
  repository: svtechnmaa/registry
  tag: 2
  pullPolicy: IfNotPresent

registryConfig: |-
  version: 0.1

  log:
    level: info

  storage:
    s3:
      bucket: registry
      region: default
      regionendpoint: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333
      secure: false
      v4auth: true
      accesskey: s3adminkey # corresponding to your s3 key
      secretkey: s3adminkey@123 # corresponding to your s3 key
      skipverify: true
      rootdirectory: "/"
    delete:
      enabled: true
    redirect:
      disable: true

  http:
    addr: :5000
