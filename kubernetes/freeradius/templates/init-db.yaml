apiVersion: batch/v1
kind: Job
metadata:
  name: "init-db"
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}

spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-for-mariadb
        image: {{ include "common.images.image" ( dict "imageRoot" .Values.init.waitForDB.image "global" .Values.global) }}
        imagePullPolicy: {{ .Values.init.waitForDB.image.pullPolicy | quote }}
        command:
        - /bin/sh
        - -c
        - |              
          {{- if .Values.externalDatabase.host }}
          until nc -zvw5 {{ .Values.externalDatabase.host }} 3306; do echo "Waiting for MariaDB..."; sleep 2; done
          {{- else }}
          until nc -zvw5 mariadb 3306; do echo "Waiting for MariaDB..."; sleep 2; done
          {{- end }}
      containers:
      - name: init-db
        image: {{ include "common.images.image" ( dict "imageRoot" .Values.init.db.image "global" .Values.global) }}
        imagePullPolicy: {{ .Values.init.db.image.pullPolicy | quote }}
        command:
          - bash
          - -ec
          - |
              for file in /docker-entrypoint-initdb.d/*.sql; do
                mysql -h $MYSQL_HOST -u $MYSQL_USER -p$MYSQL_PASSWORD --database=$MYSQL_DATABASE < "$file"
              done

        env:
          - name: MYSQL_HOST
            value: {{ .Values.externalDatabase.host | quote}}
          - name: MYSQL_PORT
            value: {{ .Values.externalDatabase.port | quote}}
          - name: MYSQL_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "mariadb.secretName" . }}
                key: db-user
          - name: MYSQL_DATABASE
            valueFrom:
              secretKeyRef:
                name: {{ include "mariadb.secretName" . }}
                key: db-database
          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "mariadb.secretName" . }}
                key: db-password

        volumeMounts:
          - name: custom-init-scripts
            mountPath: /docker-entrypoint-initdb.d
      {{- if .Values.affinity }}
      affinity: {{- include "common.tplvalues.render" (dict "value" .Values.affinity "context" $) | nindent 8 }}
      {{- else }}
      affinity:
        podAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAffinityPreset "context" $) | nindent 10 }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAntiAffinityPreset "context" $) | nindent 10 }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.nodeAffinityPreset.type "key" .Values.nodeAffinityPreset.key "values" .Values.nodeAffinityPreset.values) | nindent 10 }}
      {{- end }}  

      volumes:
        - name: custom-init-scripts
          configMap:
            name: {{ .Release.Name }}-raddb-init-schema
