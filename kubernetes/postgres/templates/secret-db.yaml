{{- if or .Values.postgresql.enabled .Values["postgresql-ha"].enabled }}
{{- $conn := "" }}
{{- if .Values.postgresql.enabled }}
{{- $conn = printf "postgresql://%s:%s@%s:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Values.postgresql.fullnameOverride .Values.postgresql.auth.database }}
{{- else if .Values["postgresql-ha"].enabled }}
{{- $conn = printf "postgresql://%s:%s@%s-%s:5432/%s" .Values["postgresql-ha"].auth.username .Values["postgresql-ha"].auth.password .Release.Name .Values["postgresql-ha"].postgresqlExternalHost .Values["postgresql-ha"].postgresql.database }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.names.fullname" . }}-connection-url
type: Opaque
data:
  POSTGRES_CONNECTION_URL: {{ $conn | b64enc | quote }}
{{- end }}